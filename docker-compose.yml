version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: onibus-express-backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend/db.json:/app/db.json
    networks:
      - onibus-rede
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: onibus-express-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:3000
    networks:
      - onibus-rede

networks:
  onibus-rede:
    driver: bridge
